name: 02 - Deploy Project
run-name: Deploy Project by @${{ github.actor }}
on:
    workflow_dispatch:
    push:

jobs:
    test:
        runs-on: ubuntu-latest
        steps:
            - name: Get Code
              uses: actions/checkout@v3
            - name: Install NodeJS
              uses: actions/setup-node@v3
              with:
                node-version: 24
            - name: Install Dependencies
              run: |
                cd 02\ Starting\ Project;
                npm ci;
            - name: Run tests
              run: |
                cd 02\ Starting\ Project;
                npm test;
    deploy:
        needs: test
        runs-on: ubuntu-latest
        steps:
            - name: Get Code
              uses: actions/checkout@v3
            - name: Install NodeJS
              uses: actions/setup-node@v3
              with:
                node-version: 24
            - name: Install Dependencies
              run: |
                cd 02\ Starting\ Project;
                npm ci;
            - name: Build Project
              run: |
                cd 02\ Starting\ Project;
                npm run build;
            - name: Deploy
              run: echo "Deploying...."