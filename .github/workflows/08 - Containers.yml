name: 08 - Containers
run-name: Run ${{ github.workflow }} | ${{ github.event_name }} | ${{ github.actor }}
on:
  workflow_dispatch
jobs:
  lint:
    runs-on: ubuntu-latest
    container:
      image: node:24
      ports:
        - 3000:3000
      options: >-
        --cpus 1
        --memory 1g
        --user node
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Cache dependencies
        id: cache
        uses: actions/cache@v5
        with:
          path: node_modules
          key: deps-node-modules-${{ hashFiles('**/package-lock.json') }}
      - name: Install dependencies
        if: steps.cache.outputs.cache-hit != 'true'
        run: |
          cd 08_src;
          npm ci;
      - name: Lint code
        run: |
          cd 08_src;
          npm run lint;