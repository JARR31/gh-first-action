name: 08 - Service Containers
run-name: Run ${{ github.workflow }} - ${{ github.action }} ${{ github.actor }}
on: workflow_dispatch

env:
  CACHE_KEY: node-deps
  MONGODB_DB_NAME: gha-demo
  MONGODB_USERNAME: root
  MONGODB_PASSWORD: root123@
  MONGODB_CLUSTER_ADDRESS: mongodb
  PORT: 8080
jobs:
  test:
    environment: testing
    runs-on: ubuntu-latest
    container:
        image: node:18
        options: >-
          --cpus 1
          --memory 1g
    services:
      mongodb:
        image: mongodb
        env:
          MONGO_INITDB_ROOT_USERNAME: ${{ env.MONGODB_USERNAME }}
          MONGO_INITDB_ROOT_PASSWORD: ${{ env.MONGODB_PASSWORD }}
        ports:
          - 27017:27017
    steps:
      - name: Get Code
        uses: actions/checkout@v3
      - name: Cache dependencies
        uses: actions/cache@v3
        with:
          path: ~/.npm
          key: ${{ env.CACHE_KEY }}-${{ hashFiles('**/package-lock.json') }}
      - name: Install dependencies
        run: npm ci
      - name: Run server
        run: npm start & npx wait-on http://127.0.0.1:${{ env.PORT }}
      - name: Run tests
        run: npm test
      - name: Output information
        run: |
          echo "MONGODB_USERNAME: ${{ env.MONGODB_USERNAME }}"
  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Output information
        run: |        
          echo "MONGODB_DB_NAME: ${{ env.MONGODB_DB_NAME }}"
          echo "MONGODB_USERNAME: ${{ env.MONGODB_USERNAME }}"
